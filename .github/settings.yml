# Branch protection rules
# Applied via Probot Settings app or documented for manual configuration
branches:
  - name: main
    protection:
      required_pull_request_reviews:
        required_approving_review_count: 1
        dismiss_stale_reviews: true
      required_status_checks:
        strict: true
        contexts:
          - "Build & Test Java"
          - "Test Frontend"
          - "Quality Gate"
      enforce_admins: false
      restrictions: null
