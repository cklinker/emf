name: Build and Deploy

on:
  push:
    branches: [main]
    paths:
      - 'kelta-ai/**'
      - 'kelta-gateway/**'
      - 'kelta-platform/runtime/**'
      - 'kelta-worker/**'
      - 'kelta-auth/**'
      - 'kelta-web/**'
      - 'kelta-ui/**'
      - 'e2e-tests/**'
      - '.github/workflows/build-and-publish-containers.yml'
  workflow_dispatch:
    inputs:
      push_images:
        description: 'Push images to DockerHub'
        required: false
        default: 'true'
        type: boolean
      deploy:
        description: 'Update ArgoCD manifests to trigger deployment'
        required: false
        default: 'true'
        type: boolean

concurrency:
  group: build-deploy-${{ github.ref }}
  cancel-in-progress: true

env:
  DOCKERHUB_USERNAME: cklinker
  JAVA_VERSION: '25'
  NODE_VERSION: '18'
  MAVEN_VERSION: '3.9.9'
  # Override MAVEN_OPTS from runner env to use default ~/.m2/repository
  MAVEN_OPTS: ''

jobs:
  # ===========================================================================
  # Build runtime + test all Java services in a single job
  # ===========================================================================
  test-java:
    name: Build & Test Java
    runs-on: k8s-runner
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'

      - name: Install Maven
        run: |
          if ! command -v mvn &> /dev/null; then
            curl -fsSL https://archive.apache.org/dist/maven/maven-3/${{ env.MAVEN_VERSION }}/binaries/apache-maven-${{ env.MAVEN_VERSION }}-bin.tar.gz | tar xz -C /opt
            echo "/opt/apache-maven-${{ env.MAVEN_VERSION }}/bin" >> $GITHUB_PATH
          fi

      - name: Cache Maven dependencies
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: maven-${{ runner.os }}-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            maven-${{ runner.os }}-

      - name: Clean stale Kelta artifacts
        run: rm -rf ~/.m2/repository/io/kelta

      - name: Build runtime modules
        run: mvn clean install -DskipTests -f kelta-platform/pom.xml -pl runtime/runtime-core,runtime/runtime-events,runtime/runtime-jsonapi,runtime/runtime-module-core,runtime/runtime-module-integration,runtime/runtime-module-schema -am -B

      - name: Test Gateway
        run: mvn verify -f kelta-gateway/pom.xml -B

      - name: Test Worker
        run: mvn verify -f kelta-worker/pom.xml -B

      - name: Test Auth Server
        run: mvn verify -f kelta-auth/pom.xml -B

      - name: Test AI Service
        run: mvn verify -f kelta-ai/pom.xml -B

  # ===========================================================================
  # Test Frontend
  # ===========================================================================
  test-frontend:
    name: Test Frontend
    runs-on: k8s-runner
    defaults:
      run:
        working-directory: kelta-web
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Cache npm dependencies
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: npm-${{ runner.os }}-${{ hashFiles('kelta-web/package-lock.json') }}
          restore-keys: |
            npm-${{ runner.os }}-

      - name: Install dependencies
        run: npm install --no-audit --no-fund
        timeout-minutes: 5

      - name: Run tests
        run: npm run test

  # ===========================================================================
  # Build and Push Container Images (parallel via matrix)
  # ===========================================================================
  build-and-push:
    name: Build & Push ${{ matrix.service }}
    needs: [test-java, test-frontend]
    runs-on: k8s-runner
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: gateway
            dockerfile: kelta-gateway/Dockerfile
            image: kelta-gateway
          - service: worker
            dockerfile: kelta-worker/Dockerfile
            image: kelta-worker
          - service: auth
            dockerfile: kelta-auth/Dockerfile
            image: kelta-auth
          - service: ui
            dockerfile: kelta-ui/Dockerfile
            image: kelta-ui
          - service: ai
            dockerfile: kelta-ai/Dockerfile
            image: kelta-ai
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to DockerHub
        if: github.event_name != 'workflow_dispatch' || inputs.push_images
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Log in to Harbor
        if: github.event_name != 'workflow_dispatch' || inputs.push_images
        uses: docker/login-action@v3
        with:
          registry: harbor.rzware.com
          username: ${{ secrets.HARBOR_USERNAME }}
          password: ${{ secrets.HARBOR_PASSWORD }}

      - name: Get short SHA
        id: sha
        run: echo "short=$(echo ${{ github.sha }} | cut -c1-7)" >> $GITHUB_OUTPUT

      - name: Determine legacy image name
        id: legacy
        run: echo "image=emf-${{ matrix.service }}" >> $GITHUB_OUTPUT

      - name: Build and push ${{ matrix.service }}
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: ${{ github.event_name != 'workflow_dispatch' || inputs.push_images }}
          tags: |
            ${{ env.DOCKERHUB_USERNAME }}/${{ matrix.image }}:latest
            ${{ env.DOCKERHUB_USERNAME }}/${{ matrix.image }}:main-${{ steps.sha.outputs.short }}
            ${{ env.DOCKERHUB_USERNAME }}/${{ steps.legacy.outputs.image }}:latest
            ${{ env.DOCKERHUB_USERNAME }}/${{ steps.legacy.outputs.image }}:main-${{ steps.sha.outputs.short }}
            harbor.rzware.com/emf/${{ steps.legacy.outputs.image }}:latest
            harbor.rzware.com/emf/${{ steps.legacy.outputs.image }}:main-${{ steps.sha.outputs.short }}
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}
          platforms: linux/amd64

  # ===========================================================================
  # Update ArgoCD manifests to trigger deployment
  # ===========================================================================
  deploy:
    name: Update ArgoCD Manifests
    needs: [build-and-push]
    if: github.ref == 'refs/heads/main' && (github.event_name != 'workflow_dispatch' || inputs.deploy)
    runs-on: k8s-runner
    steps:
      - name: Checkout ArgoCD repo
        uses: actions/checkout@v4
        with:
          repository: cklinker/homelab-argo
          token: ${{ secrets.ARGOCD_REPO_TOKEN }}
          path: homelab-argo

      - name: Get short SHA
        id: sha
        run: echo "short=$(echo ${{ github.sha }} | cut -c1-7)" >> $GITHUB_OUTPUT

      - name: Update image tags
        working-directory: homelab-argo
        run: |
          IMAGE_TAG="main-${{ steps.sha.outputs.short }}"

          # Support both kelta/ (new) and emf/ (legacy) manifest paths
          for DIR in kelta emf; do
            if [ -d "$DIR" ]; then
              echo "Found $DIR/ directory, updating image tags..."

              # Determine image name prefix based on directory
              if [ "$DIR" = "kelta" ]; then
                PREFIX="kelta"
              else
                PREFIX="emf"
              fi

              # Update gateway deployment
              if [ -f "$DIR/gateway-deployment.yaml" ]; then
                sed -i "s|image: .*${PREFIX}-gateway:.*|image: harbor.rzware.com/emf/${PREFIX}-gateway:${IMAGE_TAG}|g" "$DIR/gateway-deployment.yaml"
              fi

              # Update admin UI deployment
              if [ -f "$DIR/ui-deployment.yaml" ]; then
                sed -i "s|image: .*${PREFIX}-ui:.*|image: harbor.rzware.com/emf/${PREFIX}-ui:${IMAGE_TAG}|g" "$DIR/ui-deployment.yaml"
              fi

              # Update worker deployment
              if [ -f "$DIR/worker-deployment.yaml" ]; then
                sed -i "s|image: .*${PREFIX}-worker:.*|image: harbor.rzware.com/emf/${PREFIX}-worker:${IMAGE_TAG}|g" "$DIR/worker-deployment.yaml"
              fi

              # Update auth server deployment
              if [ -f "$DIR/auth-deployment.yaml" ]; then
                sed -i "s|image: .*${PREFIX}-auth:.*|image: harbor.rzware.com/emf/${PREFIX}-auth:${IMAGE_TAG}|g" "$DIR/auth-deployment.yaml"
              fi

              # Update AI service deployment
              if [ -f "$DIR/ai-deployment.yaml" ]; then
                sed -i "s|image: .*${PREFIX}-ai:.*|image: harbor.rzware.com/emf/${PREFIX}-ai:${IMAGE_TAG}|g" "$DIR/ai-deployment.yaml"
              fi
            fi
          done

      - name: Commit and push
        working-directory: homelab-argo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: update Kelta images to main-${{ steps.sha.outputs.short }}"
            git push
          fi

  # ===========================================================================
  # Smoke tests on k8s runner (post-deployment verification)
  # ===========================================================================
  smoke-test:
    name: Smoke Test
    needs: deploy
    runs-on: k8s-runner
    timeout-minutes: 10
    steps:
      - name: Detect namespace and deployment names
        id: k8s
        run: |
          # Check if kelta namespace has deployments, otherwise fall back to emf
          if kubectl -n kelta get deploy kelta-gateway &>/dev/null; then
            echo "ns=kelta" >> $GITHUB_OUTPUT
            echo "gateway=kelta-gateway" >> $GITHUB_OUTPUT
            echo "worker=kelta-worker" >> $GITHUB_OUTPUT
            echo "ui=kelta-ui" >> $GITHUB_OUTPUT
          else
            echo "ns=emf" >> $GITHUB_OUTPUT
            echo "gateway=emf-gateway" >> $GITHUB_OUTPUT
            echo "worker=emf-worker" >> $GITHUB_OUTPUT
            echo "ui=emf-ui" >> $GITHUB_OUTPUT
          fi
          echo "Using namespace: $(grep ns= $GITHUB_OUTPUT | cut -d= -f2)"

      - name: Wait for rollout
        run: |
          NS=${{ steps.k8s.outputs.ns }}
          echo "Waiting for deployments to roll out in namespace ${NS}..."
          kubectl -n ${NS} rollout status deployment/${{ steps.k8s.outputs.gateway }} --timeout=300s || true
          kubectl -n ${NS} rollout status deployment/${{ steps.k8s.outputs.ui }} --timeout=300s || true
          kubectl -n ${NS} rollout status deployment/${{ steps.k8s.outputs.worker }} --timeout=300s || true

      - name: Verify gateway health
        run: |
          NS=${{ steps.k8s.outputs.ns }}
          DEPLOY=${{ steps.k8s.outputs.gateway }}
          for i in $(seq 1 30); do
            STATUS=$(kubectl -n ${NS} exec deploy/${DEPLOY} -- curl -sf http://localhost:8080/actuator/health/liveness 2>/dev/null | grep -o '"status":"UP"' || true)
            if [ -n "$STATUS" ]; then
              echo "Gateway is healthy"
              exit 0
            fi
            echo "Attempt $i/30 - waiting..."
            sleep 10
          done
          echo "Gateway health check failed"
          exit 1

      - name: Verify worker health
        run: |
          NS=${{ steps.k8s.outputs.ns }}
          DEPLOY=${{ steps.k8s.outputs.worker }}
          for i in $(seq 1 30); do
            STATUS=$(kubectl -n ${NS} exec deploy/${DEPLOY} -- curl -sf http://localhost:8080/actuator/health/liveness 2>/dev/null | grep -o '"status":"UP"' || true)
            if [ -n "$STATUS" ]; then
              echo "Worker is healthy"
              exit 0
            fi
            echo "Attempt $i/30 - waiting..."
            sleep 10
          done
          echo "Worker health check failed"
          exit 1

  # ===========================================================================
  # E2E Tests (Playwright) — post-deployment UI verification
  # ===========================================================================
  e2e-test:
    name: E2E Tests
    needs: smoke-test
    runs-on: k8s-runner
    timeout-minutes: 25
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Cache npm dependencies
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: e2e-npm-${{ runner.os }}-${{ hashFiles('e2e-tests/package-lock.json') }}
          restore-keys: |
            e2e-npm-${{ runner.os }}-

      - name: Install dependencies
        working-directory: e2e-tests
        run: npm ci

      - name: Install Playwright browsers
        working-directory: e2e-tests
        run: npx playwright install --with-deps chromium

      - name: Wait for services to stabilize
        run: sleep 30

      - name: Run E2E tests
        timeout-minutes: 18
        working-directory: e2e-tests
        env:
          E2E_BASE_URL: https://emf-ui.rzware.com
          E2E_API_BASE_URL: https://emf.rzware.com
          E2E_TENANT_SLUG: default
          E2E_AUTHENTIK_URL: ${{ secrets.E2E_AUTHENTIK_URL }}
          E2E_CLIENT_ID: ${{ secrets.E2E_CLIENT_ID }}
          E2E_OIDC_PROVIDER_ID: ${{ secrets.E2E_OIDC_PROVIDER_ID }}
          E2E_TEST_USERNAME: ${{ secrets.E2E_TEST_USERNAME }}
          E2E_TEST_PASSWORD: ${{ secrets.E2E_TEST_PASSWORD }}
          E2E_SERVICE_CLIENT_ID: ${{ secrets.E2E_SERVICE_CLIENT_ID }}
          E2E_SERVICE_CLIENT_SECRET: ${{ secrets.E2E_SERVICE_CLIENT_SECRET }}
        run: npx playwright test

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-test-results
          path: |
            e2e-tests/playwright-report/
            e2e-tests/test-results/
          retention-days: 14

      - name: Upload trace files
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-traces
          path: e2e-tests/test-results/**/*.zip
          retention-days: 7
