name: Build and Deploy

on:
  push:
    branches: [main]
    paths:
      - 'kelta-ai/**'
      - 'kelta-gateway/**'
      - 'kelta-mcp/**'
      - 'kelta-platform/runtime/**'
      - 'kelta-worker/**'
      - 'kelta-auth/**'
      - 'kelta-web/**'
      - 'kelta-ui/**'
      - 'e2e-tests/**'
      - '.github/workflows/build-and-publish-containers.yml'
      - '.github/path-filters.yml'
  workflow_dispatch:
    inputs:
      push_images:
        description: 'Push images to DockerHub'
        required: false
        default: 'true'
        type: boolean
      deploy:
        description: 'Update ArgoCD manifests to trigger deployment'
        required: false
        default: 'true'
        type: boolean
      force_build_all:
        description: 'Build all services regardless of path filter (use for full rebuild)'
        required: false
        default: 'false'
        type: boolean

concurrency:
  group: build-deploy-${{ github.ref }}
  cancel-in-progress: true

env:
  DOCKERHUB_USERNAME: cklinker
  JAVA_VERSION: '25'
  NODE_VERSION: '18'
  MAVEN_VERSION: '3.9.9'
  # Override MAVEN_OPTS from runner env to use default ~/.m2/repository
  MAVEN_OPTS: ''

jobs:
  # ===========================================================================
  # Detect which paths changed since the previous push to main.
  # workflow_dispatch with force_build_all=true treats every service as changed.
  # ===========================================================================
  changes:
    name: Detect Changes
    runs-on: k8s-runner
    outputs:
      runtime: ${{ steps.resolved.outputs.runtime }}
      gateway: ${{ steps.resolved.outputs.gateway }}
      worker: ${{ steps.resolved.outputs.worker }}
      auth: ${{ steps.resolved.outputs.auth }}
      ai: ${{ steps.resolved.outputs.ai }}
      mcp: ${{ steps.resolved.outputs.mcp }}
      web: ${{ steps.resolved.outputs.web }}
      ui: ${{ steps.resolved.outputs.ui }}
      any_java: ${{ steps.resolved.outputs.any_java }}
      workflows: ${{ steps.resolved.outputs.workflows }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Filter paths
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: .github/path-filters.yml

      - name: Resolve overrides
        id: resolved
        run: |
          force_all='${{ github.event_name == 'workflow_dispatch' && inputs.force_build_all == true }}'
          resolve() {
            if [[ "$force_all" == "true" ]]; then echo true; else echo "$1"; fi
          }
          {
            echo "runtime=$(resolve '${{ steps.filter.outputs.runtime }}')"
            echo "gateway=$(resolve '${{ steps.filter.outputs.gateway }}')"
            echo "worker=$(resolve '${{ steps.filter.outputs.worker }}')"
            echo "auth=$(resolve '${{ steps.filter.outputs.auth }}')"
            echo "ai=$(resolve '${{ steps.filter.outputs.ai }}')"
            echo "mcp=$(resolve '${{ steps.filter.outputs.mcp }}')"
            echo "web=$(resolve '${{ steps.filter.outputs.web }}')"
            echo "ui=$(resolve '${{ steps.filter.outputs.ui }}')"
            echo "any_java=$(resolve '${{ steps.filter.outputs.any_java }}')"
            echo "workflows=${{ steps.filter.outputs.workflows }}"
          } >> "$GITHUB_OUTPUT"

  # ===========================================================================
  # Test changed Java services in parallel
  # ===========================================================================
  test-java:
    name: Test ${{ matrix.service }}
    needs: changes
    if: needs.changes.outputs.any_java == 'true' || needs.changes.outputs.workflows == 'true'
    runs-on: k8s-runner
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: gateway
            changed: ${{ needs.changes.outputs.gateway }}
          - service: worker
            changed: ${{ needs.changes.outputs.worker }}
          - service: auth
            changed: ${{ needs.changes.outputs.auth }}
          - service: ai
            changed: ${{ needs.changes.outputs.ai }}
          - service: mcp
            changed: ${{ needs.changes.outputs.mcp }}
    steps:
      - name: Skip if unchanged
        if: matrix.changed != 'true' && needs.changes.outputs.workflows != 'true'
        run: |
          echo "No changes affecting ${{ matrix.service }} — skipping."
          exit 0

      - name: Checkout code
        if: matrix.changed == 'true' || needs.changes.outputs.workflows == 'true'
        uses: actions/checkout@v4

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        if: matrix.changed == 'true' || needs.changes.outputs.workflows == 'true'
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'

      - name: Install Maven
        if: matrix.changed == 'true' || needs.changes.outputs.workflows == 'true'
        run: |
          if ! command -v mvn &> /dev/null; then
            curl -fsSL https://archive.apache.org/dist/maven/maven-3/${{ env.MAVEN_VERSION }}/binaries/apache-maven-${{ env.MAVEN_VERSION }}-bin.tar.gz | tar xz -C /opt
            echo "/opt/apache-maven-${{ env.MAVEN_VERSION }}/bin" >> $GITHUB_PATH
          fi

      - name: Cache Maven dependencies
        if: matrix.changed == 'true' || needs.changes.outputs.workflows == 'true'
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: maven-${{ runner.os }}-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            maven-${{ runner.os }}-

      - name: Clean stale Kelta artifacts
        if: matrix.changed == 'true' || needs.changes.outputs.workflows == 'true'
        run: rm -rf ~/.m2/repository/io/kelta

      - name: Build runtime modules
        if: matrix.changed == 'true' || needs.changes.outputs.workflows == 'true'
        run: mvn clean install -DskipTests -f kelta-platform/pom.xml -pl runtime/runtime-core,runtime/runtime-events,runtime/runtime-messaging-nats,runtime/runtime-jsonapi,runtime/runtime-module-core,runtime/runtime-module-integration,runtime/runtime-module-schema -am -B

      - name: Test ${{ matrix.service }}
        if: matrix.changed == 'true' || needs.changes.outputs.workflows == 'true'
        run: mvn verify -f kelta-${{ matrix.service }}/pom.xml -B

  # ===========================================================================
  # Test Frontend
  # ===========================================================================
  test-frontend:
    name: Test Frontend
    needs: changes
    if: needs.changes.outputs.web == 'true' || needs.changes.outputs.ui == 'true' || needs.changes.outputs.workflows == 'true'
    runs-on: k8s-runner
    defaults:
      run:
        working-directory: kelta-web
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Cache npm dependencies
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: npm-${{ runner.os }}-${{ hashFiles('kelta-web/package-lock.json') }}
          restore-keys: |
            npm-${{ runner.os }}-

      - name: Install dependencies
        run: npm install --no-audit --no-fund
        timeout-minutes: 5

      - name: Run tests
        run: npm run test

  # ===========================================================================
  # Build and Push Container Images (parallel via matrix)
  # Each matrix entry only runs its build steps when its source changed.
  # worker-migrate shares the worker Dockerfile so it rebuilds on worker change.
  # ===========================================================================
  build-and-push:
    name: Build & Push ${{ matrix.service }}
    needs: [changes, test-java, test-frontend]
    # `if: always()` lets us run after test-java/test-frontend skip;
    # the per-step `matrix.changed` check still gates each image.
    if: always() && !cancelled() && needs.test-java.result != 'failure' && needs.test-frontend.result != 'failure'
    runs-on: k8s-runner
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: gateway
            dockerfile: kelta-gateway/Dockerfile
            image: kelta-gateway
            changed: ${{ needs.changes.outputs.gateway }}
          - service: worker
            dockerfile: kelta-worker/Dockerfile
            image: kelta-worker
            changed: ${{ needs.changes.outputs.worker }}
          - service: worker-migrate
            dockerfile: kelta-worker/Dockerfile.migrate
            image: kelta-worker-migrate
            changed: ${{ needs.changes.outputs.worker }}
          - service: auth
            dockerfile: kelta-auth/Dockerfile
            image: kelta-auth
            changed: ${{ needs.changes.outputs.auth }}
          - service: ui
            dockerfile: kelta-ui/Dockerfile
            image: kelta-ui
            changed: ${{ needs.changes.outputs.ui }}
          - service: ai
            dockerfile: kelta-ai/Dockerfile
            image: kelta-ai
            changed: ${{ needs.changes.outputs.ai }}
          - service: mcp
            dockerfile: kelta-mcp/Dockerfile
            image: kelta-mcp
            changed: ${{ needs.changes.outputs.mcp }}
    steps:
      - name: Skip if unchanged
        if: matrix.changed != 'true' && needs.changes.outputs.workflows != 'true'
        run: |
          echo "No changes affecting ${{ matrix.service }} — skipping image build."
          exit 0

      - name: Checkout code
        if: matrix.changed == 'true' || needs.changes.outputs.workflows == 'true'
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        if: matrix.changed == 'true' || needs.changes.outputs.workflows == 'true'
        uses: docker/setup-buildx-action@v3

      - name: Log in to DockerHub
        if: (matrix.changed == 'true' || needs.changes.outputs.workflows == 'true') && (github.event_name != 'workflow_dispatch' || inputs.push_images)
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Log in to Harbor
        if: (matrix.changed == 'true' || needs.changes.outputs.workflows == 'true') && (github.event_name != 'workflow_dispatch' || inputs.push_images)
        uses: docker/login-action@v3
        with:
          registry: harbor.rzware.com
          username: ${{ secrets.HARBOR_USERNAME }}
          password: ${{ secrets.HARBOR_PASSWORD }}

      - name: Get short SHA
        if: matrix.changed == 'true' || needs.changes.outputs.workflows == 'true'
        id: sha
        run: echo "short=$(echo ${{ github.sha }} | cut -c1-7)" >> $GITHUB_OUTPUT

      - name: Determine legacy image name
        if: matrix.changed == 'true' || needs.changes.outputs.workflows == 'true'
        id: legacy
        run: echo "image=emf-${{ matrix.service }}" >> $GITHUB_OUTPUT

      - name: Build and push ${{ matrix.service }}
        if: matrix.changed == 'true' || needs.changes.outputs.workflows == 'true'
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: ${{ github.event_name != 'workflow_dispatch' || inputs.push_images }}
          tags: |
            ${{ env.DOCKERHUB_USERNAME }}/${{ matrix.image }}:latest
            ${{ env.DOCKERHUB_USERNAME }}/${{ matrix.image }}:main-${{ steps.sha.outputs.short }}
            ${{ env.DOCKERHUB_USERNAME }}/${{ steps.legacy.outputs.image }}:latest
            ${{ env.DOCKERHUB_USERNAME }}/${{ steps.legacy.outputs.image }}:main-${{ steps.sha.outputs.short }}
            harbor.rzware.com/emf/${{ steps.legacy.outputs.image }}:latest
            harbor.rzware.com/emf/${{ steps.legacy.outputs.image }}:main-${{ steps.sha.outputs.short }}
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}
          platforms: linux/amd64

  # ===========================================================================
  # Update ArgoCD manifests for services that were actually built.
  # Skipping services keep their previous image tag.
  # ===========================================================================
  deploy:
    name: Update ArgoCD Manifests
    needs: [changes, build-and-push]
    if: |
      always() && !cancelled()
      && needs.build-and-push.result != 'failure'
      && github.ref == 'refs/heads/main'
      && (github.event_name != 'workflow_dispatch' || inputs.deploy)
    runs-on: k8s-runner
    steps:
      - name: Checkout ArgoCD repo
        uses: actions/checkout@v4
        with:
          repository: cklinker/homelab-argo
          token: ${{ secrets.ARGOCD_REPO_TOKEN }}
          path: homelab-argo

      - name: Get short SHA
        id: sha
        run: echo "short=$(echo ${{ github.sha }} | cut -c1-7)" >> $GITHUB_OUTPUT

      - name: Install kustomize
        run: |
          if ! command -v kustomize >/dev/null 2>&1; then
            curl -fsSL "https://raw.githubusercontent.com/kubernetes-sigs/kustomize/master/hack/install_kustomize.sh" \
              | bash -s -- 5.4.3 /usr/local/bin
          fi
          kustomize version

      - name: Update image tags via kustomize
        working-directory: homelab-argo
        env:
          GATEWAY_CHANGED: ${{ needs.changes.outputs.gateway }}
          WORKER_CHANGED: ${{ needs.changes.outputs.worker }}
          AUTH_CHANGED: ${{ needs.changes.outputs.auth }}
          AI_CHANGED: ${{ needs.changes.outputs.ai }}
          MCP_CHANGED: ${{ needs.changes.outputs.mcp }}
          UI_CHANGED: ${{ needs.changes.outputs.ui }}
          WORKFLOWS_CHANGED: ${{ needs.changes.outputs.workflows }}
        run: |
          IMAGE_TAG="main-${{ steps.sha.outputs.short }}"

          bump() {
            local img="$1"
            local changed_flag="$2"
            if [[ "$changed_flag" == "true" || "$WORKFLOWS_CHANGED" == "true" ]]; then
              echo "Bumping ${img} → ${IMAGE_TAG}"
              kustomize edit set image "${img}:${IMAGE_TAG}"
            else
              echo "Skipping ${img} (no changes)"
            fi
          }

          if [ -d emf ]; then
            cd emf
            bump "harbor.rzware.com/emf/emf-gateway"        "$GATEWAY_CHANGED"
            bump "harbor.rzware.com/emf/emf-worker"         "$WORKER_CHANGED"
            bump "harbor.rzware.com/emf/emf-worker-migrate" "$WORKER_CHANGED"
            bump "harbor.rzware.com/emf/emf-auth"           "$AUTH_CHANGED"
            bump "harbor.rzware.com/emf/emf-ui"             "$UI_CHANGED"
            bump "harbor.rzware.com/emf/emf-ai"             "$AI_CHANGED"
            bump "harbor.rzware.com/emf/emf-mcp"            "$MCP_CHANGED"
            cd ..
          fi

          rendered_tags="$(kustomize build emf/ | grep -oE 'harbor\.rzware\.com/emf/emf-[a-z-]+:[^[:space:]]+' | sort -u)"
          echo "Rendered images:"
          echo "$rendered_tags"

      - name: Commit and push
        working-directory: homelab-argo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No image tag changes — nothing to commit (all builds were skipped)."
          else
            git commit -m "chore: update Kelta images to main-${{ steps.sha.outputs.short }}"
            git push
          fi

  # ===========================================================================
  # Smoke tests on k8s runner (post-deployment verification)
  # ===========================================================================
  smoke-test:
    name: Smoke Test
    needs: deploy
    if: needs.deploy.result == 'success'
    runs-on: k8s-runner
    timeout-minutes: 10
    steps:
      - name: Detect namespace and deployment names
        id: k8s
        run: |
          if kubectl -n kelta get deploy kelta-gateway &>/dev/null; then
            echo "ns=kelta" >> $GITHUB_OUTPUT
            echo "gateway=kelta-gateway" >> $GITHUB_OUTPUT
            echo "worker=kelta-worker" >> $GITHUB_OUTPUT
            echo "ui=kelta-ui" >> $GITHUB_OUTPUT
          else
            echo "ns=emf" >> $GITHUB_OUTPUT
            echo "gateway=emf-gateway" >> $GITHUB_OUTPUT
            echo "worker=emf-worker" >> $GITHUB_OUTPUT
            echo "ui=emf-ui" >> $GITHUB_OUTPUT
          fi
          echo "Using namespace: $(grep ns= $GITHUB_OUTPUT | cut -d= -f2)"

      - name: Wait for rollout
        run: |
          NS=${{ steps.k8s.outputs.ns }}
          echo "Waiting for deployments to roll out in namespace ${NS}..."
          kubectl -n ${NS} rollout status deployment/${{ steps.k8s.outputs.gateway }} --timeout=300s || true
          kubectl -n ${NS} rollout status deployment/${{ steps.k8s.outputs.ui }} --timeout=300s || true
          kubectl -n ${NS} rollout status deployment/${{ steps.k8s.outputs.worker }} --timeout=300s || true

      - name: Verify gateway health
        run: |
          NS=${{ steps.k8s.outputs.ns }}
          DEPLOY=${{ steps.k8s.outputs.gateway }}
          for i in $(seq 1 30); do
            STATUS=$(kubectl -n ${NS} exec deploy/${DEPLOY} -- curl -sf http://localhost:8080/actuator/health/liveness 2>/dev/null | grep -o '"status":"UP"' || true)
            if [ -n "$STATUS" ]; then
              echo "Gateway is healthy"
              exit 0
            fi
            echo "Attempt $i/30 - waiting..."
            sleep 10
          done
          echo "Gateway health check failed"
          exit 1

      - name: Verify worker health
        run: |
          NS=${{ steps.k8s.outputs.ns }}
          DEPLOY=${{ steps.k8s.outputs.worker }}
          for i in $(seq 1 30); do
            STATUS=$(kubectl -n ${NS} exec deploy/${DEPLOY} -- curl -sf http://localhost:8080/actuator/health/liveness 2>/dev/null | grep -o '"status":"UP"' || true)
            if [ -n "$STATUS" ]; then
              echo "Worker is healthy"
              exit 0
            fi
            echo "Attempt $i/30 - waiting..."
            sleep 10
          done
          echo "Worker health check failed"
          exit 1

  # ===========================================================================
  # Auto-rollback on smoke-test failure — reverts the image bump in homelab-argo.
  # ===========================================================================
  rollback-on-smoke-failure:
    name: Auto-rollback (smoke failed)
    needs: smoke-test
    if: failure() && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout EMF (for rollback script)
        uses: actions/checkout@v4
        with:
          path: emf

      - name: Checkout homelab-argo
        uses: actions/checkout@v4
        with:
          repository: cklinker/homelab-argo
          token: ${{ secrets.ARGOCD_REPO_TOKEN }}
          path: homelab-argo
          # CRITICAL: fetch full history. `git revert HEAD` needs the parent
          # commit object to compute the inverse diff. With the default
          # fetch-depth: 1, the parent is unreachable and revert silently
          # produces an empty tree — wiping every manifest in homelab-argo
          # and tearing down every workload via ArgoCD prune.
          fetch-depth: 0

      - name: Roll back image bump
        env:
          HOMELAB_ARGO_DIR: homelab-argo
          REASON: "smoke-test failed in run ${{ github.run_id }}"
        run: bash emf/scripts/rollback.sh

  # ===========================================================================
  # E2E Tests (Playwright) — post-deployment UI verification
  # ===========================================================================
  e2e-test:
    name: E2E Tests
    needs: smoke-test
    if: needs.smoke-test.result == 'success'
    runs-on: k8s-runner
    timeout-minutes: 25
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Cache npm dependencies
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: e2e-npm-${{ runner.os }}-${{ hashFiles('e2e-tests/package-lock.json') }}
          restore-keys: |
            e2e-npm-${{ runner.os }}-

      - name: Install dependencies
        working-directory: e2e-tests
        run: npm ci

      - name: Install Playwright browsers
        working-directory: e2e-tests
        run: npx playwright install --with-deps chromium

      - name: Wait for services to stabilize
        run: sleep 30

      - name: Run E2E tests
        timeout-minutes: 18
        working-directory: e2e-tests
        env:
          E2E_BASE_URL: https://app.kelta.io
          E2E_API_BASE_URL: https://api.kelta.io
          E2E_TENANT_SLUG: default
          E2E_AUTH_BASE_URL: ${{ secrets.E2E_AUTH_BASE_URL }}
          E2E_AUTHENTIK_URL: ${{ secrets.E2E_AUTHENTIK_URL }}
          E2E_CLIENT_ID: ${{ secrets.E2E_CLIENT_ID }}
          E2E_OIDC_PROVIDER_ID: ${{ secrets.E2E_OIDC_PROVIDER_ID }}
          E2E_TEST_USERNAME: ${{ secrets.E2E_TEST_USERNAME }}
          E2E_TEST_PASSWORD: ${{ secrets.E2E_TEST_PASSWORD }}
          E2E_SERVICE_CLIENT_ID: ${{ secrets.E2E_SERVICE_CLIENT_ID }}
          E2E_SERVICE_CLIENT_SECRET: ${{ secrets.E2E_SERVICE_CLIENT_SECRET }}
        run: npx playwright test

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-test-results
          path: |
            e2e-tests/playwright-report/
            e2e-tests/test-results/
          retention-days: 14

      - name: Upload trace files
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-traces
          path: e2e-tests/test-results/**/*.zip
          retention-days: 7

      - name: Collect failing pod logs
        if: failure()
        run: |
          mkdir -p _bug-context
          NS=$(kubectl get ns kelta -o name 2>/dev/null && echo kelta || echo emf)
          for d in gateway worker auth ai ui; do
            kubectl -n "$NS" logs -l app=${NS}-$d --tail=100 > "_bug-context/${d}.log" 2>/dev/null || true
          done
          ls -la _bug-context

      - name: Set up SSH for emf-queue deploy key
        if: failure() && github.ref == 'refs/heads/main'
        env:
          EMF_QUEUE_DEPLOY_KEY: ${{ secrets.EMF_QUEUE_DEPLOY_KEY }}
        run: |
          if [ -z "$EMF_QUEUE_DEPLOY_KEY" ]; then
            echo "EMF_QUEUE_DEPLOY_KEY secret not set — skipping bug-task file."
            exit 0
          fi
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "$EMF_QUEUE_DEPLOY_KEY" > ~/.ssh/emf_queue_deploy
          chmod 600 ~/.ssh/emf_queue_deploy
          ssh-keyscan -t ed25519,rsa github.com >> ~/.ssh/known_hosts 2>/dev/null
          cat > ~/.ssh/config <<'SSHCFG'
          Host emf-queue.github.com
            HostName github.com
            User git
            IdentityFile ~/.ssh/emf_queue_deploy
            IdentitiesOnly yes
          SSHCFG
          chmod 600 ~/.ssh/config

      - name: File bug task into emf-queue
        if: failure() && github.ref == 'refs/heads/main'
        env:
          EMF_QUEUE_DEPLOY_KEY: ${{ secrets.EMF_QUEUE_DEPLOY_KEY }}
        run: |
          if [ -z "$EMF_QUEUE_DEPLOY_KEY" ]; then
            echo "EMF_QUEUE_DEPLOY_KEY not set — skipped (see SSH-setup step)."
            exit 0
          fi
          git clone git@emf-queue.github.com:cklinker/emf-queue.git emf-queue
          cd emf-queue
          BUG_ID="BUG-$(date -u +%Y-%m-%d)-$(printf '%04d' $((RANDOM % 10000)))"
          BUG_PATH="inbox/${BUG_ID}.md"
          {
            echo "---"
            echo "id: ${BUG_ID}"
            echo "title: \"E2E failure in run ${{ github.run_id }}\""
            echo "type: bug"
            echo "priority: 1"
            echo "parallel_safe: true"
            echo "needs_migration: false"
            echo "depends_on: []"
            echo "status: inbox"
            echo "attempts: 0"
            echo "max_attempts: 3"
            echo "auto_promote: true"
            echo "source_run: \"https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}\""
            echo "source_test: \"e2e-tests/playwright (see attached report)\""
            echo "created_at: \"$(date -u +%Y-%m-%dT%H:%M:%SZ)\""
            echo "---"
            echo
            echo "## Failing run"
            echo "- Workflow: build-and-publish-containers"
            echo "- Run: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
            echo "- Commit: ${{ github.sha }}"
            echo
            echo "## Recent logs (tail 100 each)"
            for d in ../_bug-context/*.log; do
              [ -f "$d" ] || continue
              echo
              echo "### $(basename "$d" .log)"
              echo '```'
              tail -100 "$d"
              echo '```'
            done
          } > "$BUG_PATH"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "$BUG_PATH"
          git commit -m "bug: file ${BUG_ID} from failed E2E run ${{ github.run_id }}"
          git push origin main
