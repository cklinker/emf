name: CI

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

env:
  JAVA_VERSION: '25'
  NODE_VERSION: '18'
  MAVEN_VERSION: '3.9.9'
  # Override MAVEN_OPTS from runner env to use default ~/.m2/repository
  MAVEN_OPTS: ''

jobs:
  # ===========================================================================
  # Detect which paths changed in this PR so downstream jobs can skip work
  # that isn't relevant. Uses shared filter file at .github/path-filters.yml.
  # ===========================================================================
  changes:
    name: Detect Changes
    runs-on: k8s-runner
    outputs:
      runtime: ${{ steps.filter.outputs.runtime }}
      gateway: ${{ steps.filter.outputs.gateway }}
      worker: ${{ steps.filter.outputs.worker }}
      auth: ${{ steps.filter.outputs.auth }}
      ai: ${{ steps.filter.outputs.ai }}
      mcp: ${{ steps.filter.outputs.mcp }}
      web: ${{ steps.filter.outputs.web }}
      ui: ${{ steps.filter.outputs.ui }}
      any_java: ${{ steps.filter.outputs.any_java }}
      e2e: ${{ steps.filter.outputs.e2e }}
      workflows: ${{ steps.filter.outputs.workflows }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          # paths-filter needs full history to diff against PR base
          fetch-depth: 0

      - name: Filter paths
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: .github/path-filters.yml

  # ===========================================================================
  # Build runtime + test changed Java services in parallel
  # Each matrix entry runs only if its service (or runtime) changed.
  # Runtime change cascades to every service via the filter file.
  # ===========================================================================
  test-java:
    name: Test ${{ matrix.service }}
    needs: changes
    runs-on: k8s-runner
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: gateway
            changed: ${{ needs.changes.outputs.gateway }}
          - service: worker
            changed: ${{ needs.changes.outputs.worker }}
          - service: auth
            changed: ${{ needs.changes.outputs.auth }}
          - service: ai
            changed: ${{ needs.changes.outputs.ai }}
          - service: mcp
            changed: ${{ needs.changes.outputs.mcp }}
    if: needs.changes.outputs.any_java == 'true' || needs.changes.outputs.workflows == 'true'
    steps:
      - name: Skip if unchanged
        if: matrix.changed != 'true' && needs.changes.outputs.workflows != 'true'
        run: |
          echo "No changes affecting ${{ matrix.service }} — skipping."
          exit 0

      - name: Checkout code
        if: matrix.changed == 'true' || needs.changes.outputs.workflows == 'true'
        uses: actions/checkout@v4

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        if: matrix.changed == 'true' || needs.changes.outputs.workflows == 'true'
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'

      - name: Install Maven
        if: matrix.changed == 'true' || needs.changes.outputs.workflows == 'true'
        run: |
          if ! command -v mvn &> /dev/null; then
            curl -fsSL https://archive.apache.org/dist/maven/maven-3/${{ env.MAVEN_VERSION }}/binaries/apache-maven-${{ env.MAVEN_VERSION }}-bin.tar.gz | tar xz -C /opt
            echo "/opt/apache-maven-${{ env.MAVEN_VERSION }}/bin" >> $GITHUB_PATH
          fi

      - name: Cache Maven dependencies
        if: matrix.changed == 'true' || needs.changes.outputs.workflows == 'true'
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: maven-${{ runner.os }}-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            maven-${{ runner.os }}-

      - name: Clean stale Kelta artifacts
        if: matrix.changed == 'true' || needs.changes.outputs.workflows == 'true'
        run: rm -rf ~/.m2/repository/io/kelta

      - name: Build runtime modules
        if: matrix.changed == 'true' || needs.changes.outputs.workflows == 'true'
        run: mvn clean install -DskipTests -f kelta-platform/pom.xml -pl runtime/runtime-core,runtime/runtime-events,runtime/runtime-messaging-nats,runtime/runtime-jsonapi,runtime/runtime-module-core,runtime/runtime-module-integration,runtime/runtime-module-schema -am -B

      - name: Test ${{ matrix.service }}
        if: matrix.changed == 'true' || needs.changes.outputs.workflows == 'true'
        run: mvn verify -f kelta-${{ matrix.service }}/pom.xml -B

      - name: Upload test results
        if: always() && (matrix.changed == 'true' || needs.changes.outputs.workflows == 'true')
        uses: actions/upload-artifact@v4
        with:
          name: java-test-results-${{ matrix.service }}
          path: kelta-${{ matrix.service }}/target/surefire-reports/
          if-no-files-found: ignore
          retention-days: 7

      - name: Upload coverage report
        if: always() && (matrix.changed == 'true' || needs.changes.outputs.workflows == 'true')
        uses: actions/upload-artifact@v4
        with:
          name: java-coverage-${{ matrix.service }}
          path: kelta-${{ matrix.service }}/target/site/jacoco/
          if-no-files-found: ignore
          retention-days: 7

  # ===========================================================================
  # Test Frontend (lint, typecheck, unit tests with coverage)
  # Runs when kelta-web or kelta-ui changed (ui depends on web).
  # ===========================================================================
  test-frontend:
    name: Test Frontend
    needs: changes
    if: needs.changes.outputs.web == 'true' || needs.changes.outputs.ui == 'true' || needs.changes.outputs.workflows == 'true'
    runs-on: k8s-runner
    defaults:
      run:
        working-directory: kelta-web
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Cache npm dependencies
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: npm-${{ runner.os }}-${{ hashFiles('kelta-web/package-lock.json') }}
          restore-keys: |
            npm-${{ runner.os }}-

      - name: Install dependencies
        run: npm install --no-audit --no-fund
        timeout-minutes: 5

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npm run typecheck

      - name: Format check
        run: npm run format:check

      - name: Run tests with coverage
        run: npm run test:coverage

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-coverage
          path: kelta-web/coverage/
          if-no-files-found: ignore
          retention-days: 7

  # ===========================================================================
  # Cross-service integration tests (Testcontainers harness)
  # Skipped on docs / frontend-only PRs. Runtime or any Java service change
  # forces a full integration run via the any_java filter.
  # ===========================================================================
  integration-tests:
    name: Integration Tests
    needs: [changes, test-java]
    if: needs.changes.outputs.any_java == 'true' || needs.changes.outputs.workflows == 'true'
    runs-on: k8s-runner-integration
    timeout-minutes: 20
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'

      - name: Install Maven
        run: |
          if ! command -v mvn &> /dev/null; then
            curl -fsSL https://archive.apache.org/dist/maven/maven-3/${{ env.MAVEN_VERSION }}/binaries/apache-maven-${{ env.MAVEN_VERSION }}-bin.tar.gz | tar xz -C /opt
            echo "/opt/apache-maven-${{ env.MAVEN_VERSION }}/bin" >> $GITHUB_PATH
          fi

      - name: Cache Maven dependencies
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: maven-${{ runner.os }}-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            maven-${{ runner.os }}-

      - name: Clean stale Kelta artifacts
        run: rm -rf ~/.m2/repository/io/kelta

      - name: Build runtime modules
        run: mvn clean install -DskipTests -f kelta-platform/pom.xml -pl runtime/runtime-core,runtime/runtime-events,runtime/runtime-messaging-nats,runtime/runtime-jsonapi,runtime/runtime-module-core,runtime/runtime-module-integration,runtime/runtime-module-schema -am -B

      - name: Build service JARs (required by test harness)
        run: |
          mvn install -DskipTests -f kelta-auth/pom.xml -B
          mvn install -DskipTests -f kelta-worker/pom.xml -B
          mvn install -DskipTests -f kelta-gateway/pom.xml -B

      - name: Pre-pull Docker images
        run: |
          docker pull redis:7-alpine
          docker pull nats:2.10-alpine
          docker pull ghcr.io/cerbos/cerbos:0.40.0
          docker pull eclipse-temurin:25-jre-alpine

      - name: Install psql client
        run: |
          if ! command -v psql >/dev/null 2>&1; then
            apt-get update
            apt-get install -y --no-install-recommends postgresql-client
          fi
          psql --version

      - name: Checkout CI DB schema
        run: |
          eval "$(scripts/ci/checkout-db.sh)"
          echo "::add-mask::$CI_DB_PASSWORD"
          {
            echo "CI_DB_JDBC_URL=$CI_DB_JDBC_URL"
            echo "CI_DB_USER=$CI_DB_USER"
            echo "CI_DB_PASSWORD=$CI_DB_PASSWORD"
          } >> "$GITHUB_ENV"

      - name: Pre-build service images
        run: |
          for service in kelta-worker kelta-auth kelta-gateway; do
            jar="${service}/target/${service}-1.0.0-SNAPSHOT.jar"
            ctx=$(mktemp -d)
            cp "$jar" "$ctx/app.jar"
            cat > "$ctx/Dockerfile" <<'EOF'
          FROM eclipse-temurin:25-jre-alpine
          COPY app.jar /app.jar
          ENTRYPOINT ["java", "-Xmx512m", "-XX:MaxMetaspaceSize=256m", "-jar", "/app.jar"]
          EOF
            docker build -t "${service}-harness" "$ctx"
            rm -rf "$ctx"
            echo "Built ${service}-harness"
          done

      - name: Run cross-service harness
        env:
          TESTCONTAINERS_RYUK_DISABLED: "true"
          KELTA_HARNESS_PREBUILT_IMAGES: "true"
          MAVEN_OPTS: "-Xmx1g -XX:MaxMetaspaceSize=384m"
        run: mvn verify -f kelta-test-harness/pom.xml -Pintegration-tests -B

      - name: Upload harness reports
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: harness-failsafe-reports
          path: kelta-test-harness/target/failsafe-reports/
          retention-days: 7

      - name: Release CI DB schema
        if: always()
        run: scripts/ci/release-db.sh

  # ===========================================================================
  # E2E tests (Playwright) — spins up the full docker-compose stack using the
  # JVM-mode service Dockerfiles from docker-compose.ci.yml so PR feedback stays
  # under ~25 min instead of the ~50 min a native GraalVM build would cost.
  # Native images are still validated post-merge by build-and-publish-containers.yml.
  # ===========================================================================
  e2e:
    name: E2E Tests
    needs: changes
    if: needs.changes.outputs.e2e == 'true' || needs.changes.outputs.workflows == 'true'
    runs-on: k8s-runner-integration
    timeout-minutes: 45
    # Global concurrency: only one e2e run at a time across all PRs.
    # The stack binds fixed host ports (5432/6379/4222/8080/...) and the
    # k8s-runner shares a Docker daemon, so parallel runs would collide.
    # cancel-in-progress: false so a queued PR run still gets a turn after
    # the current one finishes.
    concurrency:
      group: e2e-shared-runner
      cancel-in-progress: false
    env:
      COMPOSE_PROJECT_NAME: ci-${{ github.run_id }}-${{ github.run_attempt }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Generate .env (JWK_SET + encryption key)
        run: make setup

      - name: Build service images (JVM, GHA cache)
        run: |
          docker buildx bake \
            -f docker-compose.yml -f docker-compose.ci.yml \
            --set "*.cache-from=type=gha,scope=e2e-ci-jvm" \
            --set "*.cache-to=type=gha,mode=max,scope=e2e-ci-jvm" \
            --load \
            kelta-auth kelta-worker kelta-gateway kelta-ui

      - name: Start stack
        run: |
          docker compose -f docker-compose.yml -f docker-compose.ci.yml \
            up -d --wait --wait-timeout 300

      - name: Seed admin + verify health
        run: |
          docker compose -f docker-compose.yml -f docker-compose.ci.yml \
            --profile seed run --rm kelta-bootstrap

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'e2e-tests/package-lock.json'

      - name: Install Playwright + browsers
        working-directory: e2e-tests
        run: |
          npm ci
          npx playwright install --with-deps chromium

      - name: Run Playwright tests
        working-directory: e2e-tests
        env:
          CI: 'true'
          E2E_BASE_URL: http://localhost:5173
          E2E_API_BASE_URL: http://localhost:8080
          E2E_AUTH_BASE_URL: http://localhost:8081
          E2E_AUTH_DIRECT_LOGIN_URL: http://localhost:8081
          E2E_TENANT_SLUG: default
          E2E_TEST_USERNAME: admin
          E2E_TEST_PASSWORD: password
        run: npx playwright test

      - name: Dump compose logs on failure
        if: failure()
        run: |
          mkdir -p _logs
          for s in kelta-auth kelta-worker kelta-gateway kelta-ui postgres redis nats cerbos; do
            docker compose -f docker-compose.yml -f docker-compose.ci.yml \
              logs --no-color "$s" > "_logs/${s}.log" 2>&1 || true
          done

      - name: Upload e2e artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-report
          path: |
            e2e-tests/playwright-report/
            e2e-tests/test-results/
            _logs/
          if-no-files-found: ignore
          retention-days: 14

      - name: Stop stack + remove volumes
        if: always()
        run: |
          docker compose -f docker-compose.yml -f docker-compose.ci.yml \
            --profile ai --profile tools --profile seed down -v || true

  # ===========================================================================
  # Quality gate — succeeds when every triggered job succeeded.
  # Jobs that skipped (because their paths didn't change) report `skipped`
  # which is not a failure. Only `failure` and `cancelled` block the gate.
  # ===========================================================================
  quality-gate:
    name: Quality Gate
    needs: [changes, test-java, test-frontend, integration-tests, e2e]
    if: always()
    runs-on: k8s-runner
    steps:
      - name: Check job results
        run: |
          for job in test-java test-frontend integration-tests e2e; do
            result_var="${job//-/_}_result"
            case "${job}" in
              test-java)         result="${{ needs.test-java.result }}" ;;
              test-frontend)     result="${{ needs.test-frontend.result }}" ;;
              integration-tests) result="${{ needs.integration-tests.result }}" ;;
              e2e)               result="${{ needs.e2e.result }}" ;;
            esac
            echo "${job}: ${result}"
            if [[ "${result}" == "failure" || "${result}" == "cancelled" ]]; then
              echo "Job ${job} did not pass — quality gate failed."
              exit 1
            fi
          done
          echo "All triggered jobs passed (skipped jobs are allowed)."
