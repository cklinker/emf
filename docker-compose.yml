# Kelta Local Development Environment
# Provides: PostgreSQL, Redis, Kafka, and Keycloak (OIDC)

services:
  # ===========================================
  # PostgreSQL Database
  # ===========================================
  postgres:
    image: postgres:15-alpine
    container_name: kelta-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: kelta
      POSTGRES_PASSWORD: kelta
      POSTGRES_DB: kelta_control_plane
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kelta -d kelta_control_plane"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - kelta-network

  # ===========================================
  # Redis Cache
  # ===========================================
  redis:
    image: redis:7-alpine
    container_name: kelta-redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - kelta-network

  # ===========================================
  # NATS (JetStream mode)
  # ===========================================
  nats:
    image: nats:2.10-alpine
    container_name: kelta-nats
    restart: unless-stopped
    command: ["--jetstream", "--store_dir", "/data/nats-server/jetstream"]
    ports:
      - "4222:4222"
      - "8222:8222"
    volumes:
      - nats_data:/data/nats-server
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8222/healthz"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - kelta-network

  # ===========================================
  # Keycloak OIDC Provider
  # ===========================================
  keycloak:
    image: quay.io/keycloak/keycloak:23.0
    container_name: kelta-keycloak
    restart: unless-stopped
    command: start-dev --import-realm
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
      KC_HTTP_PORT: 8180
      KC_HEALTH_ENABLED: "true"
    ports:
      - "8180:8180"
    volumes:
      - ./docker/keycloak/kelta-realm.json:/opt/keycloak/data/import/kelta-realm.json:ro
      - keycloak_data:/opt/keycloak/data
    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/127.0.0.1/8180;echo -e 'GET /health/ready HTTP/1.1\r\nhost: localhost\r\nConnection: close\r\n\r\n' >&3;if [ $? -eq 0 ]; then echo 'Healthcheck Successful';exit 0;else echo 'Healthcheck Failed';exit 1;fi;"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    networks:
      - kelta-network

  # ===========================================
  # Redis Commander (optional - for debugging)
  # ===========================================
  redis-commander:
    image: rediscommander/redis-commander:latest
    container_name: kelta-redis-commander
    restart: unless-stopped
    environment:
      REDIS_HOSTS: local:redis:6379
    ports:
      - "8091:8081"
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - kelta-network
    profiles:
      - tools

  # ===========================================
  # pgAdmin (optional - for debugging)
  # ===========================================
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: kelta-pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@kelta.local
      PGADMIN_DEFAULT_PASSWORD: admin
      PGADMIN_CONFIG_SERVER_MODE: "False"
    ports:
      - "8092:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - kelta-network
    profiles:
      - tools

  # ===========================================
  # Kelta API Gateway Service
  # ===========================================
  kelta-gateway:
    build:
      context: .
      dockerfile: kelta-gateway/Dockerfile
    container_name: kelta-gateway
    restart: unless-stopped
    environment:
      SPRING_PROFILES_ACTIVE: integration-test
      NATS_URL: nats://nats:4222
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_ISSUER_URI: http://keycloak:8180/realms/kelta
      SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_JWK_SET_URI: http://keycloak:8180/realms/kelta/protocol/openid-connect/certs
      KELTA_GATEWAY_SERVICE_ACCOUNT_CLIENT_ID: kelta-gateway-service
      KELTA_GATEWAY_SERVICE_ACCOUNT_CLIENT_SECRET: kelta-gateway-service-secret
      LOGGING_LEVEL_IO_KELTA: INFO
    ports:
      - "8080:8080"
    depends_on:
      redis:
        condition: service_healthy
      nats:
        condition: service_healthy
      keycloak:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/actuator/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 60s
    networks:
      - kelta-network

  # ===========================================
  # Kelta Worker Service
  # ===========================================
  kelta-worker:
    build:
      context: .
      dockerfile: kelta-worker/Dockerfile
    container_name: kelta-worker
    restart: unless-stopped
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/kelta_control_plane
      SPRING_DATASOURCE_USERNAME: kelta
      SPRING_DATASOURCE_PASSWORD: kelta
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      NATS_URL: nats://nats:4222
      WORKER_POOL: default
      WORKER_CAPACITY: 50
      LOGGING_LEVEL_IO_KELTA: INFO
    ports:
      - "8083:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      nats:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/actuator/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 60s
    networks:
      - kelta-network

  # ===========================================
  # OpenSearch (observability data store)
  # ===========================================
  opensearch:
    image: opensearchproject/opensearch:2.17.1
    container_name: kelta-opensearch
    environment:
      discovery.type: single-node
      plugins.security.disabled: "true"
      DISABLE_INSTALL_DEMO_CONFIG: "true"
      OPENSEARCH_JAVA_OPTS: "-Xms512m -Xmx512m"
    ports:
      - "9200:9200"
    volumes:
      - opensearch_data:/usr/share/opensearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9200/_cluster/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - kelta-network
    profiles:
      - observability

  # ===========================================
  # Jaeger V2 (OTLP receiver + trace UI)
  # ===========================================
  jaeger:
    image: jaegertracing/jaeger:2
    container_name: kelta-jaeger
    command: ["--config", "/etc/jaeger/config.yaml"]
    volumes:
      - ./docker/jaeger/config.yaml:/etc/jaeger/config.yaml:ro
      - ./docker/jaeger/ui-config.json:/etc/jaeger/ui-config.json:ro
    ports:
      - "16686:16686"
      - "4317:4317"
      - "4318:4318"
    depends_on:
      opensearch:
        condition: service_healthy
    networks:
      - kelta-network
    profiles:
      - observability

  # ===========================================
  # Sample Service for Integration Testing
  # ===========================================
  sample-service:
    build:
      context: .
      dockerfile: sample-service/Dockerfile
    container_name: kelta-sample-service
    restart: unless-stopped
    environment:
      SPRING_PROFILES_ACTIVE: integration-test
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/kelta_control_plane
      SPRING_DATASOURCE_USERNAME: kelta
      SPRING_DATASOURCE_PASSWORD: kelta
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      KELTA_STORAGE_MODE: PHYSICAL_TABLES
      LOGGING_LEVEL_IO_KELTA: INFO
    ports:
      - "8082:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/actuator/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 60s
    networks:
      - kelta-network

volumes:
  postgres_data:
  redis_data:
  nats_data:
  keycloak_data:
  pgadmin_data:
  opensearch_data:

networks:
  kelta-network:
    driver: bridge
