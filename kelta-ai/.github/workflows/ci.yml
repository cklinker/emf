# CI managed at monorepo root. See ../../.github/workflows/ci.yml
# This reference file enables per-project scanner detection.
name: CI
on:
  workflow_dispatch:
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'

      - name: Build
        run: mvn clean package -DskipTests

      - name: Lint
        run: mvn checkstyle:check

      - name: Format check
        run: mvn spotless:check

      - name: Test
        run: mvn verify

      - name: Coverage report
        run: mvn jacoco:report

  security-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: OWASP dependency check
        run: mvn org.owasp:dependency-check-maven:check || true

  deploy:
    needs: [build-and-test, security-scan]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - name: Build container image
        run: docker build -t ${{ github.event.repository.name }} .
      - name: Push to registry
        run: echo "Push to harbor.rzware.com"
