# CI is managed at the monorepo root level.
# See ../../.github/workflows/ci.yml for the full pipeline.
#
# This file exists as a reference for tools that scan per-project CI configuration.
# The root CI workflow runs:
#   - mvn verify (unit + integration tests)
#   - JaCoCo coverage reporting
#   - Checkstyle linting
#   - Security scanning via Gitleaks
#   - Deploy via build-and-publish-containers.yml

name: CI (reference)

on:
  workflow_dispatch:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'

      - name: Build
        run: mvn clean package -DskipTests

      - name: Lint
        run: mvn checkstyle:check

      - name: Test
        run: mvn verify

      - name: Security scan
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
