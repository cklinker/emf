server:
  port: ${SERVER_PORT:8080}

spring:
  threads:
    virtual:
      enabled: true
  application:
    name: kelta-auth

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/kelta}
    username: ${DB_USERNAME:kelta}
    password: ${DB_PASSWORD:kelta}
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2

  data:
    redis:
      host: ${SPRING_DATA_REDIS_HOST:${REDIS_HOST:localhost}}
      port: ${SPRING_DATA_REDIS_PORT:${REDIS_PORT:6379}}

  session:
    store-type: redis
    redis:
      namespace: kelta:auth:session
    timeout: 8h
    cookie:
      http-only: true
      secure: true
      same-site: strict

  thymeleaf:
    cache: true

kelta:
  # AES-256 master key for envelope encryption (Base64-encoded 32 bytes)
  # Generate with: openssl rand -base64 32
  encryption:
    key: ${KELTA_ENCRYPTION_KEY:}
  auth:
    issuer-uri: ${KELTA_AUTH_ISSUER_URI:http://localhost:8080}
    worker-url: ${WORKER_SERVICE_URL:http://localhost:8081}
    # Cookie domain for SSO across subdomains (e.g., .rzware.com)
    cookie-domain: ${COOKIE_DOMAIN:localhost}
    # RSA key for JWT signing (JWK JSON format)
    jwk-set: ${JWK_SET:}
    # UI login redirect URL pattern
    ui-base-url: ${UI_BASE_URL:http://localhost:5173}
    # CORS allowed origins
    cors-allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173}
    # Enable direct login endpoint for programmatic auth (e2e tests)
    direct-login:
      enabled: ${DIRECT_LOGIN_ENABLED:false}
  internal:
    token: ${KELTA_INTERNAL_TOKEN:}
    # Connected app: Superset OAuth2 client registration
    superset-client-id: ${SUPERSET_CLIENT_ID:}
    superset-client-secret: ${SUPERSET_CLIENT_SECRET:}
    superset-redirect-uri: ${SUPERSET_REDIRECT_URI:}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when-authorized
      probes:
        enabled: true
  tracing:
    export:
      enabled: true
    sampling:
      probability: ${OTEL_TRACES_SAMPLER_ARG:1.0}
    propagation:
      type: w3c
  otlp:
    metrics:
      export:
        url: ${MANAGEMENT_OTLP_METRICS_EXPORT_URL:http://localhost:4318/v1/metrics}

logging:
  level:
    io.kelta.auth: ${LOG_LEVEL:INFO}
    org.springframework.security: ${SECURITY_LOG_LEVEL:WARN}

