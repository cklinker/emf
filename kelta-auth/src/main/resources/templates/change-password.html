<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Change Password — Kelta Platform</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0f1117;
            color: #e4e4e7;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .container {
            width: 100%;
            max-width: 400px;
            padding: 2rem;
        }

        .logo {
            text-align: center;
            margin-bottom: 2rem;
        }

        .logo h1 {
            font-size: 1.5rem;
            font-weight: 600;
            color: #f4f4f5;
        }

        .logo p {
            color: #71717a;
            font-size: 0.875rem;
            margin-top: 0.5rem;
        }

        .card {
            background: #18181b;
            border: 1px solid #27272a;
            border-radius: 0.75rem;
            padding: 2rem;
        }

        .alert-error {
            background: #451a1a;
            border: 1px solid #7f1d1d;
            color: #fca5a5;
            padding: 0.75rem 1rem;
            border-radius: 0.5rem;
            font-size: 0.875rem;
            margin-bottom: 1.5rem;
        }

        .alert-info {
            background: #1e3a5f;
            border: 1px solid #1e40af;
            color: #93c5fd;
            padding: 0.75rem 1rem;
            border-radius: 0.5rem;
            font-size: 0.875rem;
            margin-bottom: 1.5rem;
        }

        .form-group {
            margin-bottom: 1.25rem;
        }

        label {
            display: block;
            font-size: 0.875rem;
            font-weight: 500;
            color: #a1a1aa;
            margin-bottom: 0.5rem;
        }

        input[type="password"] {
            width: 100%;
            padding: 0.625rem 0.875rem;
            background: #09090b;
            border: 1px solid #3f3f46;
            border-radius: 0.5rem;
            color: #f4f4f5;
            font-size: 0.9375rem;
            outline: none;
            transition: border-color 0.15s;
        }

        input:focus {
            border-color: #6366f1;
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.15);
        }

        .btn-primary {
            width: 100%;
            padding: 0.625rem 1rem;
            background: #4f46e5;
            color: #fff;
            border: none;
            border-radius: 0.5rem;
            font-size: 0.9375rem;
            font-weight: 500;
            cursor: pointer;
            transition: background 0.15s;
            margin-top: 0.5rem;
        }

        .btn-primary:hover {
            background: #4338ca;
        }

        .footer {
            text-align: center;
            margin-top: 1.5rem;
            font-size: 0.8125rem;
            color: #52525b;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">
            <h1>Kelta Platform</h1>
            <p>Change your password</p>
        </div>

        <div class="card">
            <div class="alert-info">
                You must change your password before continuing.
            </div>

            <div th:if="${error}" class="alert-error">
                <span th:text="${error}">Error message</span>
            </div>

            <form th:action="@{/change-password}" method="post">
                <div class="form-group">
                    <label for="currentPassword">Current Password</label>
                    <input type="password" id="currentPassword" name="currentPassword"
                           placeholder="Enter current password" required autofocus>
                </div>

                <div class="form-group">
                    <label for="newPassword">New Password</label>
                    <input type="password" id="newPassword" name="newPassword"
                           placeholder="At least 8 characters" required minlength="8">
                </div>

                <div class="form-group">
                    <label for="confirmPassword">Confirm New Password</label>
                    <input type="password" id="confirmPassword" name="confirmPassword"
                           placeholder="Re-enter new password" required minlength="8">
                </div>

                <button type="submit" class="btn-primary">Change Password</button>
            </form>
        </div>

        <div class="footer">
            Kelta Enterprise Platform
        </div>
    </div>
</body>
</html>
