<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Authorize Application — Kelta Platform</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0f1117;
            color: #e4e4e7;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .consent-container {
            width: 100%;
            max-width: 440px;
            padding: 2rem;
        }

        .logo {
            text-align: center;
            margin-bottom: 2rem;
        }

        .logo h1 {
            font-size: 1.5rem;
            font-weight: 600;
            color: #f4f4f5;
        }

        .logo p {
            color: #71717a;
            font-size: 0.875rem;
            margin-top: 0.5rem;
        }

        .card {
            background: #18181b;
            border: 1px solid #27272a;
            border-radius: 0.75rem;
            padding: 2rem;
        }

        .app-name {
            font-size: 1.125rem;
            font-weight: 600;
            color: #f4f4f5;
            text-align: center;
            margin-bottom: 0.5rem;
        }

        .app-description {
            color: #a1a1aa;
            font-size: 0.875rem;
            text-align: center;
            margin-bottom: 1.5rem;
        }

        .section-label {
            font-size: 0.8125rem;
            font-weight: 600;
            color: #a1a1aa;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 0.75rem;
        }

        .scope-list {
            list-style: none;
            margin-bottom: 1.5rem;
        }

        .scope-item {
            display: flex;
            align-items: flex-start;
            gap: 0.75rem;
            padding: 0.75rem 0;
            border-bottom: 1px solid #27272a;
        }

        .scope-item:last-child {
            border-bottom: none;
        }

        .scope-item input[type="checkbox"] {
            margin-top: 0.25rem;
            accent-color: #6366f1;
            width: 1rem;
            height: 1rem;
        }

        .scope-info {
            flex: 1;
        }

        .scope-label {
            font-size: 0.9375rem;
            font-weight: 500;
            color: #f4f4f5;
        }

        .scope-description {
            font-size: 0.8125rem;
            color: #71717a;
            margin-top: 0.125rem;
        }

        .previously-approved {
            opacity: 0.6;
        }

        .previously-approved .scope-label::after {
            content: ' (previously approved)';
            font-weight: 400;
            font-size: 0.75rem;
            color: #52525b;
        }

        .button-row {
            display: flex;
            gap: 0.75rem;
            margin-top: 1.5rem;
        }

        .btn {
            flex: 1;
            padding: 0.625rem 1rem;
            border: none;
            border-radius: 0.5rem;
            font-size: 0.9375rem;
            font-weight: 500;
            cursor: pointer;
            transition: background 0.15s;
        }

        .btn-deny {
            background: #27272a;
            color: #e4e4e7;
            border: 1px solid #3f3f46;
        }

        .btn-deny:hover {
            background: #3f3f46;
        }

        .btn-authorize {
            background: #4f46e5;
            color: #fff;
        }

        .btn-authorize:hover {
            background: #4338ca;
        }

        .footer {
            text-align: center;
            margin-top: 1.5rem;
            font-size: 0.8125rem;
            color: #52525b;
        }

        .user-info {
            text-align: center;
            font-size: 0.8125rem;
            color: #71717a;
            margin-bottom: 1rem;
        }

        .user-info strong {
            color: #a1a1aa;
        }
    </style>
</head>
<body>
    <div class="consent-container">
        <div class="logo">
            <h1>Kelta Platform</h1>
            <p>Authorize Application</p>
        </div>

        <div class="card">
            <div class="app-name" th:text="${clientName}">Application Name</div>
            <div class="app-description">
                This application is requesting access to your account.
            </div>

            <div class="user-info">
                Signed in as <strong th:text="${principalName}">user@example.com</strong>
            </div>

            <form th:action="@{/oauth2/authorize}" method="post">
                <input type="hidden" name="client_id" th:value="${clientId}">
                <input type="hidden" name="state" th:value="${state}">

                <!-- Scopes requiring approval -->
                <div th:if="${!scopes.isEmpty()}">
                    <div class="section-label">Permissions requested</div>
                    <ul class="scope-list">
                        <li th:each="scopeItem : ${scopes}" class="scope-item">
                            <input type="checkbox" th:name="scope" th:id="${scopeItem.scope}"
                                   th:value="${scopeItem.scope}" checked>
                            <div class="scope-info">
                                <div class="scope-label" th:text="${scopeItem.label}">Scope</div>
                                <div class="scope-description" th:text="${scopeItem.description}">Description</div>
                            </div>
                        </li>
                    </ul>
                </div>

                <!-- Previously approved scopes (shown but not editable) -->
                <div th:if="${!previouslyApprovedScopes.isEmpty()}">
                    <div class="section-label">Previously approved</div>
                    <ul class="scope-list previously-approved">
                        <li th:each="scopeItem : ${previouslyApprovedScopes}" class="scope-item">
                            <input type="checkbox" th:name="scope" th:id="${scopeItem.scope}"
                                   th:value="${scopeItem.scope}" checked disabled>
                            <input type="hidden" th:name="scope" th:value="${scopeItem.scope}">
                            <div class="scope-info">
                                <div class="scope-label" th:text="${scopeItem.label}">Scope</div>
                                <div class="scope-description" th:text="${scopeItem.description}">Description</div>
                            </div>
                        </li>
                    </ul>
                </div>

                <div class="button-row">
                    <button type="submit" class="btn btn-deny" name="consent_action" value="deny">
                        Deny
                    </button>
                    <button type="submit" class="btn btn-authorize" name="consent_action" value="approve">
                        Authorize
                    </button>
                </div>
            </form>
        </div>

        <div class="footer">
            Kelta Enterprise Platform
        </div>
    </div>
</body>
</html>
