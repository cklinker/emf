<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Link expired — Kelta Platform</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0f1117; color: #e4e4e7; min-height: 100vh;
            display: flex; align-items: center; justify-content: center;
        }
        .login-container { width: 100%; max-width: 400px; padding: 2rem; }
        .logo { text-align: center; margin-bottom: 2rem; }
        .logo h1 { font-size: 1.5rem; font-weight: 600; color: #f4f4f5; }
        .card { background: #18181b; border: 1px solid #27272a; border-radius: 0.75rem; padding: 2rem; text-align: center; }
        .alert-error {
            background: #451a1a; border: 1px solid #7f1d1d; color: #fca5a5;
            padding: 0.75rem 1rem; border-radius: 0.5rem; font-size: 0.875rem; margin-bottom: 1.5rem;
        }
        .card p { color: #a1a1aa; font-size: 0.875rem; line-height: 1.6; }
        .btn-primary {
            display: inline-block; margin-top: 1.25rem; padding: 0.625rem 1.5rem;
            background: #4f46e5; color: #fff; border: none; border-radius: 0.5rem;
            font-size: 0.9375rem; font-weight: 500; cursor: pointer; text-decoration: none;
        }
        .btn-primary:hover { background: #4338ca; }
        .footer { text-align: center; margin-top: 1.5rem; font-size: 0.8125rem; color: #52525b; }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="logo">
            <h1>Kelta Platform</h1>
        </div>

        <div class="card">
            <div class="alert-error">
                This sign-in link is invalid, expired, or was already used.
            </div>
            <p>Sign-in links work once and expire quickly for your security.</p>
            <a th:href="@{/portal/login}" class="btn-primary">Request a new link</a>
        </div>

        <div class="footer">
            Kelta Enterprise Platform
        </div>
    </div>
</body>
</html>
