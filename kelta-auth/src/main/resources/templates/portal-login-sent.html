<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Check your email — Kelta Platform</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0f1117; color: #e4e4e7; min-height: 100vh;
            display: flex; align-items: center; justify-content: center;
        }
        .login-container { width: 100%; max-width: 400px; padding: 2rem; }
        .logo { text-align: center; margin-bottom: 2rem; }
        .logo h1 { font-size: 1.5rem; font-weight: 600; color: #f4f4f5; }
        .card { background: #18181b; border: 1px solid #27272a; border-radius: 0.75rem; padding: 2rem; text-align: center; }
        .card h2 { font-size: 1.125rem; color: #f4f4f5; margin-bottom: 0.75rem; }
        .card p { color: #a1a1aa; font-size: 0.875rem; line-height: 1.6; }
        .card p + p { margin-top: 0.75rem; }
        .email { color: #e4e4e7; font-weight: 500; }
        .footer { text-align: center; margin-top: 1.5rem; font-size: 0.8125rem; color: #52525b; }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="logo">
            <h1>Kelta Platform</h1>
        </div>

        <div class="card">
            <h2>Check your email</h2>
            <p>
                If <span class="email" th:text="${email}">you@example.com</span>
                belongs to a portal account, a sign-in link is on its way.
            </p>
            <p>
                The link works once and expires in 15 minutes. If it doesn't
                arrive, check your spam folder or contact your provider.
            </p>
        </div>

        <div class="footer">
            Kelta Enterprise Platform
        </div>
    </div>
</body>
</html>
