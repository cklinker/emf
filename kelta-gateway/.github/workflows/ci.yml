name: kelta-gateway CI

on:
  workflow_dispatch:
    inputs:
      reason:
        description: Reason for manual trigger
        required: false
        default: manual

# Note: Full monorepo CI is defined at the repository root.
# This workflow provides gateway-scoped execution for targeted runs.

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: temurin
          cache: maven

      - name: Build (skip tests)
        working-directory: kelta-gateway
        run: ./mvnw compile -DskipTests --no-transfer-progress

  lint:
    name: Lint
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: temurin
          cache: maven

      - name: Checkstyle
        working-directory: kelta-gateway
        run: ./mvnw checkstyle:check --no-transfer-progress

      - name: Spotless check
        working-directory: kelta-gateway
        run: ./mvnw spotless:check --no-transfer-progress

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: temurin
          cache: maven

      - name: Run tests
        working-directory: kelta-gateway
        run: ./mvnw test --no-transfer-progress

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gateway-test-results
          path: kelta-gateway/target/surefire-reports/

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gateway-coverage
          path: kelta-gateway/target/site/jacoco/

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        with:
          config-path: kelta-gateway/.gitleaks.toml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
