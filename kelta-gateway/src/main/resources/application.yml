# Harbor registry integration
spring:
  threads:
    virtual:
      enabled: true
  application:
    name: kelta-gateway

  # Request size limits for in-memory buffering
  codec:
    max-in-memory-size: 10MB

  # Kafka configuration for receiving configuration updates
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      group-id: kelta-gateway
      auto-offset-reset: latest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: io.kelta.gateway.event,java.util
  
  # Redis configuration for caching and rate limiting
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      timeout: 2000ms
      connect-timeout: 2000ms
      lettuce:
        pool:
          min-idle: 5
          max-idle: 10
          max-active: 20
  
  # Security configuration for JWT validation
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${OIDC_ISSUER_URI:${JWT_ISSUER_URI:${KELTA_AUTH_ISSUER_URI:http://localhost:8080}}}
  
  # Cloud Gateway configuration
  cloud:
    gateway:
      default-filters:
        - name: RequestSize
          args:
            maxSize: 10MB          # Default 10 MB request body limit
      httpclient:
        connect-timeout: 5000
        response-timeout: 120s
        max-header-size: 16384     # 16 KB max header size to prevent header-based attacks
        pool:
          max-connections: 500
          max-idle-time: 30s


# Kelta Gateway specific configuration
kelta:
  gateway:
    # Tenant slug URL prefix configuration
    tenant-slug:
      enabled: ${TENANT_SLUG_ENABLED:true}
      require-prefix: ${TENANT_SLUG_REQUIRE_PREFIX:false}
      platform-paths: /actuator,/platform,/internal,/otel,/api/webhooks
      cache-refresh-ms: 60000

    # Worker service URL (used for routing AND internal API calls)
    worker-service-url: ${WORKER_SERVICE_URL:http://kelta-worker:80}

    # AI service URL (used for routing /api/ai/** requests)
    ai-service-url: ${AI_SERVICE_URL:http://emf-ai:80}
    
    # Kafka topics for configuration updates and record change events
    kafka:
      topics:
        collection-changed: kelta.config.collection.changed
        worker-assignment-changed: kelta.worker.assignment.changed
        record-changed: kelta.record.changed
    
    # Rate limiting is driven by per-tenant governor limits (apiCallsPerDay)
    # fetched from the worker during bootstrap.
    # See GatewayCacheManager for details.

    # Cerbos authorization engine
    cerbos:
      host: ${CERBOS_HOST:cerbos.emf.svc.cluster.local}
      grpc-port: ${CERBOS_GRPC_PORT:3593}

    # Security settings
    security:
      jwt-clock-skew-seconds: 30   # Tolerance for clock drift between gateway and IdP
      single-issuer: ${SINGLE_ISSUER:true}   # When true, all tokens must come from kelta-auth (recommended)
      permissions-enabled: ${PERMISSIONS_ENABLED:true}   # Object-level permission enforcement (default: enabled)
      permissions-cache-ttl-minutes: ${PERMISSIONS_CACHE_TTL:5}   # Redis cache TTL for resolved permissions
      # Paths accessible without authentication (GET/HEAD only).
      # Matched as prefixes against the slug-stripped path.
      public-paths: /api/ui-pages,/api/ui-menus,/api/oidc-providers,/api/tenants
      # Paths accessible without authentication for ALL HTTP methods.
      # Used for endpoints receiving data from unauthenticated sources (e.g., browser OTEL SDK).
      unauthenticated-paths: /otel,/api/webhooks

# Actuator configuration for health and metrics
management:
  endpoints:
    web:
      exposure:
        include: health,metrics,info
  endpoint:
    health:
      show-details: always
      probes:
        enabled: true
  health:
    redis:
      enabled: true
    kafka:
      enabled: true
  tracing:
    export:
      enabled: true
    sampling:
      probability: ${OTEL_TRACES_SAMPLER_ARG:1.0}
    propagation:
      type: w3c
  metrics:
    distribution:
      percentiles-histogram:
        kelta.gateway.requests: true
      percentiles:
        kelta.gateway.requests: 0.5,0.95,0.99

