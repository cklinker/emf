# Harbor registry integration
spring:
  threads:
    virtual:
      enabled: true
  application:
    name: kelta-gateway

  # Gateway has no static assets to serve. Disabling the static-resource handler
  # prevents the misleading "No static resource X" 404 when a request fails to
  # match a Gateway route — the GlobalErrorHandler / Gateway not-found path now
  # surfaces the actual routing miss instead.
  webflux:
    resources:
      add-mappings: false

  # Request size limits for in-memory buffering
  codec:
    max-in-memory-size: 10MB

  # Redis configuration for caching and rate limiting
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      timeout: 2000ms
      connect-timeout: 2000ms
      lettuce:
        pool:
          min-idle: ${REDIS_POOL_MIN_IDLE:10}
          max-idle: ${REDIS_POOL_MAX_IDLE:50}
          max-active: ${REDIS_POOL_MAX_ACTIVE:100}
          max-wait: ${REDIS_POOL_MAX_WAIT_MS:2000}ms
  
  # Security configuration for JWT validation
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${OIDC_ISSUER_URI:${JWT_ISSUER_URI:${KELTA_AUTH_ISSUER_URI:http://localhost:8080}}}
  
  # Cloud Gateway configuration
  cloud:
    gateway:
      default-filters:
        - name: RequestSize
          args:
            maxSize: 10MB          # Default 10 MB request body limit
      httpclient:
        connect-timeout: 5000
        response-timeout: 120s
        max-header-size: 16384     # 16 KB max header size to prevent header-based attacks
        pool:
          max-connections: ${GATEWAY_HTTPCLIENT_MAX_CONNECTIONS:2000}
          max-idle-time: ${GATEWAY_HTTPCLIENT_MAX_IDLE_TIME:30s}
          acquire-timeout: ${GATEWAY_HTTPCLIENT_ACQUIRE_TIMEOUT_MS:5000}


# Kelta Gateway specific configuration
kelta:
  nats:
    url: ${NATS_URL:nats://localhost:4222}
    connection-name: kelta-gateway
  gateway:
    # Tenant slug URL prefix configuration
    tenant-slug:
      enabled: ${TENANT_SLUG_ENABLED:true}
      require-prefix: ${TENANT_SLUG_REQUIRE_PREFIX:false}
      platform-paths: /actuator,/platform,/internal,/otel,/api/webhooks,/scim
      cache-refresh-ms: 60000

    # Worker service URL (used for routing AND internal API calls)
    worker-service-url: ${WORKER_SERVICE_URL:http://emf-worker:80}

    # AI service URL (used for routing /api/ai/** requests)
    ai-service-url: ${AI_SERVICE_URL:http://emf-ai:80}
    
    # Rate limiting is driven by per-tenant governor limits (apiCallsPerDay)
    # fetched from the worker during bootstrap.
    # See GatewayCacheManager for details.

    # Per-tenant IP allowlist (network access restriction).
    # Non-admin users of a restricted tenant may only reach /api/** from an allowed CIDR;
    # MANAGE_TENANTS holders bypass. Config is fetched at bootstrap and refreshed via NATS.
    ip-allowlist:
      enabled: ${IP_ALLOWLIST_ENABLED:true}   # Global kill-switch for the filter
      # When true, X-Forwarded-For / X-Real-IP hops are considered (resilient to proxy topology
      # but client-spoofable). Set false to match only the socket source address.
      trust-forwarded-for: ${IP_ALLOWLIST_TRUST_XFF:true}

    # Cerbos authorization engine
    cerbos:
      host: ${CERBOS_HOST:cerbos.emf.svc.cluster.local}
      grpc-port: ${CERBOS_GRPC_PORT:3593}

    # Security settings
    security:
      jwt-clock-skew-seconds: 30   # Tolerance for clock drift between gateway and IdP
      permissions-enabled: ${PERMISSIONS_ENABLED:true}   # Object-level permission enforcement (default: enabled)
      permissions-cache-ttl-minutes: ${PERMISSIONS_CACHE_TTL:5}   # Redis cache TTL for resolved permissions
      # Paths accessible without authentication (GET/HEAD only).
      # Matched as prefixes against the slug-stripped path.
      public-paths: /api/ui-pages,/api/ui-menus,/api/oidc-providers,/api/tenants
      # Paths accessible without authentication for ALL HTTP methods.
      # Used for endpoints receiving data from unauthenticated sources (e.g., browser OTEL SDK).
      unauthenticated-paths: /otel,/api/webhooks,/scim

# Actuator configuration for health and metrics
management:
  endpoints:
    web:
      exposure:
        include: health,metrics,info
  endpoint:
    health:
      show-details: always
      probes:
        enabled: true
  health:
    redis:
      enabled: true
  tracing:
    export:
      enabled: true
    sampling:
      probability: ${OTEL_TRACES_SAMPLER_ARG:1.0}
    propagation:
      type: w3c
  otlp:
    metrics:
      export:
        url: ${MANAGEMENT_OTLP_METRICS_EXPORT_URL:http://localhost:4318/v1/metrics}
  metrics:
    distribution:
      percentiles-histogram:
        kelta.gateway.requests: true
      percentiles:
        kelta.gateway.requests: 0.5,0.95,0.99

