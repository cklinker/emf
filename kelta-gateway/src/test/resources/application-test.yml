spring:
  application:
    name: kelta-gateway-test

  # Redis configuration for integration tests
  data:
    redis:
      host: localhost
      port: 6379
  
  # JWT configuration for integration tests - use real Keycloak
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://localhost:8180/realms/kelta
          jwk-set-uri: http://localhost:8180/realms/kelta/protocol/openid-connect/certs

# Kelta Gateway test configuration
kelta:
  gateway:
    worker-service-url: http://emf-worker:80
    # Rate limiting is driven by per-tenant governor limits from the worker
    security:
      permissions-enabled: true
      permissions-cache-ttl-minutes: 5

# Disable actuator endpoints for tests
management:
  endpoints:
    web:
      exposure:
        include: health

# Reduce logging noise in tests
logging:
  level:
    root: WARN
    io.kelta.gateway: INFO
