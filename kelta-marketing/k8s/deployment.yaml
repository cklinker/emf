apiVersion: apps/v1
kind: Deployment
metadata:
  name: kelta-marketing
  namespace: kelta
  labels:
    app: kelta-marketing
spec:
  replicas: 2
  selector:
    matchLabels:
      app: kelta-marketing
  template:
    metadata:
      labels:
        app: kelta-marketing
    spec:
      containers:
        - name: kelta-marketing
          image: ghcr.io/cklinker/kelta-marketing:latest
          ports:
            - containerPort: 80
              protocol: TCP
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 3
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: kelta-marketing
  namespace: kelta
  labels:
    app: kelta-marketing
spec:
  type: ClusterIP
  ports:
    - port: 80
      targetPort: 80
      protocol: TCP
  selector:
    app: kelta-marketing
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: kelta-marketing
  namespace: kelta
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
spec:
  ingressClassName: nginx
  rules:
    - host: www.kelta.io
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: kelta-marketing
                port:
                  number: 80
    - host: kelta.io
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: kelta-marketing
                port:
                  number: 80
  tls:
    - hosts:
        - www.kelta.io
        - kelta.io
      secretName: kelta-io-tls
