name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: kelta-ui/app/.nvmrc
          cache: npm
          cache-dependency-path: kelta-ui/app/package-lock.json
      - name: Install dependencies
        working-directory: kelta-ui/app
        run: npm ci
      - name: Format check
        working-directory: kelta-ui/app
        run: npm run format:check
      - name: Lint
        working-directory: kelta-ui/app
        run: npm run lint

  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: kelta-ui/app/.nvmrc
          cache: npm
          cache-dependency-path: kelta-ui/app/package-lock.json
      - name: Install dependencies
        working-directory: kelta-ui/app
        run: npm ci
      - name: Typecheck
        working-directory: kelta-ui/app
        run: npx tsc -b --noEmit

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: kelta-ui/app/.nvmrc
          cache: npm
          cache-dependency-path: kelta-ui/app/package-lock.json
      - name: Install dependencies
        working-directory: kelta-ui/app
        run: npm ci
      - name: Run tests
        working-directory: kelta-ui/app
        run: npm run test:coverage

  security:
    name: Secret Scanning
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint, typecheck, test]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: kelta-ui/app/.nvmrc
          cache: npm
          cache-dependency-path: kelta-ui/app/package-lock.json
      - name: Install dependencies
        working-directory: kelta-ui/app
        run: npm ci
      - name: Build
        working-directory: kelta-ui/app
        run: npm run build
      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: kelta-ui/app/dist/
          retention-days: 7

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: [build]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: production
    steps:
      - uses: actions/checkout@v4
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: kelta-ui/app/dist/
      - name: Build and push Docker image
        run: |
          echo "${{ secrets.HARBOR_PASSWORD }}" | docker login harbor.rzware.com -u "${{ secrets.HARBOR_USERNAME }}" --password-stdin
          docker build -t harbor.rzware.com/kelta/kelta-ui:${{ github.sha }} -t harbor.rzware.com/kelta/kelta-ui:latest ./kelta-ui/app
          docker push harbor.rzware.com/kelta/kelta-ui:${{ github.sha }}
          docker push harbor.rzware.com/kelta/kelta-ui:latest
