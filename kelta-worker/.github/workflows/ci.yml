name: kelta-worker CI

# This workflow is intentionally minimal.
# The authoritative CI runs at the monorepo root and covers all modules.
# Use this for targeted worker-only runs or manual dispatch.
on:
  workflow_dispatch:
    inputs:
      skip_tests:
        description: 'Skip tests (build only)'
        required: false
        default: 'false'
        type: boolean

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'
          cache: maven

      - name: Build runtime modules
        run: |
          mvn clean install -DskipTests \
            -f kelta-platform/pom.xml \
            -pl runtime/runtime-core,runtime/runtime-events,runtime/runtime-jsonapi,runtime/runtime-module-core,runtime/runtime-module-integration,runtime/runtime-module-schema \
            -am -B

      - name: Build worker
        run: mvn clean package -DskipTests -f kelta-worker/pom.xml -B

  lint:
    name: Lint
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'
          cache: maven

      - name: Build runtime modules
        run: |
          mvn clean install -DskipTests \
            -f kelta-platform/pom.xml \
            -pl runtime/runtime-core,runtime/runtime-events,runtime/runtime-jsonapi,runtime/runtime-module-core,runtime/runtime-module-integration,runtime/runtime-module-schema \
            -am -B

      - name: Run Checkstyle
        run: mvn checkstyle:check -f kelta-worker/pom.xml -B

      - name: Check Spotless formatting
        run: mvn spotless:check -f kelta-worker/pom.xml -B

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: build
    if: ${{ inputs.skip_tests != 'true' }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'
          cache: maven

      - name: Build runtime modules
        run: |
          mvn clean install -DskipTests \
            -f kelta-platform/pom.xml \
            -pl runtime/runtime-core,runtime/runtime-events,runtime/runtime-jsonapi,runtime/runtime-module-core,runtime/runtime-module-integration,runtime/runtime-module-schema \
            -am -B

      - name: Run tests
        run: mvn verify -f kelta-worker/pom.xml -B

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: kelta-worker/target/surefire-reports/

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          config-path: kelta-worker/.gitleaks.toml
