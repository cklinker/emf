server:
  port: ${SERVER_PORT:8080}
  shutdown: graceful

spring:
  threads:
    virtual:
      enabled: true
  application:
    name: kelta-worker
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/kelta_control_plane}
    username: ${SPRING_DATASOURCE_USERNAME:kelta}
    password: ${SPRING_DATASOURCE_PASSWORD:kelta}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: ${DB_POOL_MAX:30}
      minimum-idle: ${DB_POOL_MIN_IDLE:5}
      connection-timeout: ${DB_POOL_CONNECTION_TIMEOUT_MS:5000}
      idle-timeout: ${DB_POOL_IDLE_TIMEOUT_MS:600000}
      max-lifetime: ${DB_POOL_MAX_LIFETIME_MS:1800000}
      leak-detection-threshold: ${DB_POOL_LEAK_DETECTION_MS:30000}
      pool-name: kelta-worker-pool
  flyway:
    enabled: false   # migrations run via K8s PreSync Job (application-migrate.yml re-enables)
    baseline-on-migrate: true
    baseline-version: 0
    # Kelta migrations never use Flyway ${} placeholders; seed SQL for
    # email_template intentionally stores ${variable} as data for runtime
    # substitution, which would otherwise trip placeholder validation.
    placeholder-replacement: false
    # V1..V161 were flattened into V1__baseline.sql (superseded scripts live in
    # db/migration-archive/, off the classpath). Databases already migrated past
    # the baseline still have V2..V161 in their history with no matching files;
    # tolerate those "missing" entries so validate() passes. A one-time
    # `flyway repair` realigns the V1 checksum on those DBs — see
    # db/migration/README.md. Fresh installs just run V1__baseline.
    ignore-migration-patterns: "*:missing"
  data:
    redis:
      host: ${SPRING_DATA_REDIS_HOST:localhost}
      port: ${SPRING_DATA_REDIS_PORT:6379}
  mail:
    # Defaults target a local mailpit (SMTP on :1025, no auth, no TLS) so a
    # bare `mvn spring-boot:run` works against the docker-compose stack out of
    # the box. K8s deployments override SMTP_HOST/PORT/USERNAME/PASSWORD/AUTH/
    # STARTTLS via env.
    host: ${SMTP_HOST:localhost}
    port: ${SMTP_PORT:1025}
    username: ${SMTP_USERNAME:}
    password: ${SMTP_PASSWORD:}
    properties:
      mail.smtp.auth: ${SMTP_AUTH:false}
      mail.smtp.starttls.enable: ${SMTP_STARTTLS:false}
  lifecycle:
    timeout-per-shutdown-phase: 30s

kelta:
  # AES-256 master key for envelope encryption (Base64-encoded 32 bytes)
  # Generate with: openssl rand -base64 32
  encryption:
    key: ${KELTA_ENCRYPTION_KEY:}
  auth:
    issuer-uri: ${KELTA_AUTH_ISSUER_URI:https://auth.kelta.io}
  external-base-url: ${EXTERNAL_BASE_URL:http://localhost:8080}
  worker:
    id: ${WORKER_ID:}
    cerbos-cb-threshold: ${CERBOS_CB_THRESHOLD:3}
    cerbos-cb-cooldown-seconds: ${CERBOS_CB_COOLDOWN_SECONDS:10}
    cerbos:
      host: ${CERBOS_HOST:cerbos.emf.svc.cluster.local}
      grpc-port: ${CERBOS_GRPC_PORT:3593}
  svix:
    server-url: ${SVIX_SERVER_URL:http://localhost:8071}
    public-url: ${SVIX_PUBLIC_URL:${SVIX_SERVER_URL:http://localhost:8071}}
    auth-token: ${SVIX_AUTH_TOKEN:}
  superset:
    url: ${SUPERSET_URL:}
    public-url: ${SUPERSET_PUBLIC_URL:${SUPERSET_URL:}}
    admin-username: ${SUPERSET_ADMIN_USERNAME:admin}
    admin-password: ${SUPERSET_ADMIN_PASSWORD:}
  email:
    from-address: ${EMAIL_FROM_ADDRESS:noreply@kelta.io}
    from-name: ${EMAIL_FROM_NAME:Kelta Platform}
    enabled: ${EMAIL_ENABLED:true}
  campaigns:
    runner-enabled: ${CAMPAIGN_RUNNER_ENABLED:true}
    poll-interval-ms: ${CAMPAIGN_POLL_INTERVAL_MS:15000}
    batch-size: ${CAMPAIGN_BATCH_SIZE:5}
    # Per-campaign delivery throttle (recipients/second) — spam-rate control.
    send-rate-per-second: ${CAMPAIGN_SEND_RATE_PER_SECOND:20}
    # Fallback daily cap when no per-tenant campaignEmailsPerDay governor limit is set.
    daily-send-limit: ${CAMPAIGN_DAILY_SEND_LIMIT:50000}
    # Public base URL for open-pixel / click-redirect / unsubscribe links (must be reachable).
    tracking-base-url: ${CAMPAIGN_TRACKING_BASE_URL:${EXTERNAL_BASE_URL:http://localhost:8080}}
    # HMAC signing secret for tracking tokens — MUST be overridden in every deployment.
    tracking-secret: ${CAMPAIGN_TRACKING_SECRET:}
  internal:
    token: ${KELTA_INTERNAL_TOKEN:}
  telehealth:
    # HMAC secret for emailed visit links — set in every non-dev environment.
    visit-secret: ${KELTA_TELEHEALTH_VISIT_SECRET:}
    reminders:
      enabled: ${TELEHEALTH_REMINDERS_ENABLED:true}
      offset-minutes: ${TELEHEALTH_REMINDER_OFFSET_MINUTES:60}
      poll-interval-ms: ${TELEHEALTH_REMINDER_POLL_MS:60000}
    livekit:
      # Self-hosted LiveKit SFU (docker-compose --profile telehealth locally;
      # livekit app in homelab-argo for prod). Dev defaults apply when unset.
      url: ${KELTA_LIVEKIT_URL:}
      api-key: ${KELTA_LIVEKIT_API_KEY:}
      api-secret: ${KELTA_LIVEKIT_API_SECRET:}
  scheduler:
    enabled: ${SCHEDULER_ENABLED:true}
    poll-interval-ms: ${SCHEDULER_POLL_INTERVAL_MS:60000}
  tempo:
    url: ${TEMPO_URL:http://tempo.observability.svc.cluster.local:3200}
  loki:
    url: ${LOKI_URL:http://loki.observability.svc.cluster.local:3100}
  mimir:
    url: ${MIMIR_URL:http://mimir.observability.svc.cluster.local:8080}
  observability:
    request-logging:
      enabled: ${REQUEST_LOGGING_ENABLED:true}
      max-body-size: 16384
      sensitive-headers: Authorization,Cookie,Set-Cookie,X-Api-Key
      sensitive-body-fields: password,secret,token,apiKey,creditCard,ssn
      exclude-paths: /actuator,/health
  storage:
    mode: PHYSICAL_TABLES
    s3:
      enabled: ${KELTA_S3_ENABLED:false}
      endpoint: ${KELTA_S3_ENDPOINT:http://localhost:3900}
      public-endpoint: ${KELTA_S3_PUBLIC_ENDPOINT:https://s3.rzware.com}
      region: ${KELTA_S3_REGION:garage}
      bucket: ${KELTA_S3_BUCKET:kelta-attachments}
      access-key: ${KELTA_S3_ACCESS_KEY:}
      secret-key: ${KELTA_S3_SECRET_KEY:}
      presigned-url-expiry-minutes: ${KELTA_S3_URL_EXPIRY_MINUTES:15}
  nats:
    url: ${NATS_URL:nats://localhost:4222}
    connection-name: kelta-worker

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always
      probes:
        enabled: true
    metrics:
      enabled: true
  health:
    readinessState:
      enabled: true
    livenessState:
      enabled: true
    mail:
      enabled: ${kelta.email.enabled:true}
  tracing:
    export:
      enabled: true
    sampling:
      probability: ${OTEL_TRACES_SAMPLER_ARG:1.0}
    propagation:
      type: w3c
  otlp:
    metrics:
      export:
        url: ${MANAGEMENT_OTLP_METRICS_EXPORT_URL:http://localhost:4318/v1/metrics}
  metrics:
    distribution:
      percentiles-histogram:
        kelta_worker_request_duration_seconds: true
      percentiles:
        kelta_worker_request_duration_seconds: 0.5,0.95,0.99
    tags:
      application: ${spring.application.name}

