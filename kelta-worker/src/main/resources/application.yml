server:
  port: ${SERVER_PORT:8080}
  shutdown: graceful

spring:
  application:
    name: kelta-worker
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/kelta_control_plane}
    username: ${SPRING_DATASOURCE_USERNAME:kelta}
    password: ${SPRING_DATASOURCE_PASSWORD:kelta}
    driver-class-name: org.postgresql.Driver
    hikari:
      connection-init-sql: SET app.current_tenant_id = ''
  flyway:
    enabled: true
    baseline-on-migrate: true
    baseline-version: 0
  data:
    redis:
      host: ${SPRING_DATA_REDIS_HOST:localhost}
      port: ${SPRING_DATA_REDIS_PORT:6379}
  kafka:
    bootstrap-servers: ${SPRING_KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      group-id: ${kelta.worker.id:kelta-worker-default}
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
  mail:
    host: ${SMTP_HOST:localhost}
    port: ${SMTP_PORT:587}
    username: ${SMTP_USERNAME:}
    password: ${SMTP_PASSWORD:}
    properties:
      mail.smtp.auth: ${SMTP_AUTH:true}
      mail.smtp.starttls.enable: ${SMTP_STARTTLS:true}
  lifecycle:
    timeout-per-shutdown-phase: 30s

kelta:
  # AES-256 master key for envelope encryption (Base64-encoded 32 bytes)
  # Generate with: openssl rand -base64 32
  encryption:
    key: ${KELTA_ENCRYPTION_KEY:}
  external-base-url: ${EXTERNAL_BASE_URL:http://localhost:8080}
  worker:
    id: ${WORKER_ID:}
    cerbos:
      host: ${CERBOS_HOST:cerbos.emf.svc.cluster.local}
      grpc-port: ${CERBOS_GRPC_PORT:3593}
  svix:
    server-url: ${SVIX_SERVER_URL:http://localhost:8071}
    public-url: ${SVIX_PUBLIC_URL:${SVIX_SERVER_URL:http://localhost:8071}}
    auth-token: ${SVIX_AUTH_TOKEN:}
  superset:
    url: ${SUPERSET_URL:}
    public-url: ${SUPERSET_PUBLIC_URL:${SUPERSET_URL:}}
    admin-username: ${SUPERSET_ADMIN_USERNAME:admin}
    admin-password: ${SUPERSET_ADMIN_PASSWORD:}
  email:
    from-address: ${EMAIL_FROM_ADDRESS:noreply@kelta.io}
    from-name: ${EMAIL_FROM_NAME:Kelta Platform}
    enabled: ${EMAIL_ENABLED:true}
  internal:
    token: ${KELTA_INTERNAL_TOKEN:}
  scheduler:
    enabled: ${SCHEDULER_ENABLED:true}
    poll-interval-ms: ${SCHEDULER_POLL_INTERVAL_MS:60000}
  opensearch:
    url: ${OPENSEARCH_URL:http://localhost:9200}
    index-prefix: ${OPENSEARCH_INDEX_PREFIX:kelta}
  observability:
    request-logging:
      enabled: ${REQUEST_LOGGING_ENABLED:true}
      max-body-size: 16384
      sensitive-headers: Authorization,Cookie,Set-Cookie,X-Api-Key
      sensitive-body-fields: password,secret,token,apiKey,creditCard,ssn
      exclude-paths: /actuator,/health
  storage:
    mode: PHYSICAL_TABLES
    s3:
      enabled: ${KELTA_S3_ENABLED:false}
      endpoint: ${KELTA_S3_ENDPOINT:http://localhost:3900}
      public-endpoint: ${KELTA_S3_PUBLIC_ENDPOINT:https://s3.rzware.com}
      region: ${KELTA_S3_REGION:garage}
      bucket: ${KELTA_S3_BUCKET:kelta-attachments}
      access-key: ${KELTA_S3_ACCESS_KEY:}
      secret-key: ${KELTA_S3_SECRET_KEY:}
      presigned-url-expiry-minutes: ${KELTA_S3_URL_EXPIRY_MINUTES:15}
  kafka:
    topics:
      collection-changed: kelta.config.collection.changed

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always
      probes:
        enabled: true
    metrics:
      enabled: true
  health:
    readinessState:
      enabled: true
    livenessState:
      enabled: true
  tracing:
    enabled: true
    sampling:
      probability: ${OTEL_TRACES_SAMPLER_ARG:1.0}
    propagation:
      type: w3c
  metrics:
    distribution:
      percentiles-histogram:
        kelta_worker_request_duration_seconds: true
      percentiles:
        kelta_worker_request_duration_seconds: 0.5,0.95,0.99
    tags:
      application: ${spring.application.name}
